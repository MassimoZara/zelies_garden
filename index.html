<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zelie's Garden</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #1c3a10;
      --panel:     #2e1a09;
      --border:    #5e3a18;
      --accent:    #e94560;
      --gold:      #f5c542;
      --green:     #5cb85c;
      --text:      #ede5c5;
      --text-muted:#9a8855;
    }

    body {
      background:
        linear-gradient(to bottom,
          #7ec8e3 0%,
          #b8e0f0 18%,
          #d4f0b8 42%,
          #6abf40 58%,
          #3a8a18 78%,
          #1e5008 100%
        );
      background-attachment: fixed;
      color: var(--text);
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ───────────────────────────────────────────── */
    header {
      width: 100%;
      background: linear-gradient(to bottom, #3a2008, #2e1a09);
      border-bottom: 3px solid #7a4820;
      box-shadow: 0 3px 16px rgba(0,0,0,0.55);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 1.4rem;
      letter-spacing: 2px;
      color: var(--gold);
      text-shadow: 2px 2px 0 #000;
    }

    #hud {
      display: flex;
      gap: 24px;
      font-size: 0.9rem;
    }

    #hud span { color: var(--text-muted); }
    #hud strong { color: var(--gold); }

    /* ── Main layout ──────────────────────────────────────── */
    main {
      width: 100%;
      max-width: 1100px;
      padding: 24px 16px;
      display: flex;
      gap: 20px;
    }

    /* ── Garden grid ──────────────────────────────────────── */
    #garden-area {
      flex: 1;
    }

    #garden-area h2 {
      font-size: 0.8rem;
      letter-spacing: 3px;
      color: var(--text-muted);
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    #garden-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    /* ── Single pot ───────────────────────────────────────── */
    .pot {
      background: linear-gradient(160deg, #3a2410 50%, #2e1a09 100%);
      border: 2px solid #6a3e18;
      border-radius: 4px;
      padding: 16px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      min-height: 300px;
      transition: border-color 0.15s, box-shadow 0.15s;
      position: relative;
      box-shadow: 0 3px 10px rgba(0,0,0,0.4),
                  inset 0 1px 0 rgba(255,180,80,0.06);
    }

    .pot:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 16px rgba(0,0,0,0.5), 0 0 8px rgba(233,69,96,0.2);
    }

    .pot canvas {
      image-rendering: pixelated;
      width: 192px;
      height: 192px;
    }

    .pot .plant-name {
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    .pot .growth-bar {
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .pot .growth-bar-fill {
      height: 100%;
      background: var(--green);
      transition: width 0.3s;
    }

    .pot .status-icon {
      position: absolute;
      top: 6px;
      right: 8px;
      font-size: 0.8rem;
    }

    /* ── Sidebar ──────────────────────────────────────────── */
    #sidebar {
      width: 240px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel {
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: 4px;
      padding: 14px;
    }

    .panel h3 {
      font-size: 0.75rem;
      letter-spacing: 2px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
    }

    /* ── Inventory / seeds ────────────────────────────────── */
    #seed-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .seed-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 2px;
      transition: background 0.1s;
    }

    .seed-item:hover { background: var(--border); }
    .seed-item.selected { background: var(--accent); }

    .seed-item .seed-qty { color: var(--text-muted); }

    /* ── Shop ─────────────────────────────────────────────── */
    #shop-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .shop-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8rem;
    }

    .shop-item button {
      background: var(--border);
      color: var(--gold);
      border: 1px solid var(--gold);
      padding: 2px 8px;
      font-family: inherit;
      font-size: 0.75rem;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.1s;
    }

    .shop-item button:hover { background: var(--gold); color: #000; }
    .shop-item button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Action log ───────────────────────────────────────── */
    #log {
      font-size: 0.75rem;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 120px;
      overflow-y: auto;
    }

    #log p { line-height: 1.4; }
    #log p span { color: var(--accent); }

    /* ── Modal overlay ────────────────────────────────────── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #modal-overlay.open { display: flex; }

    #modal {
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: 4px;
      padding: 24px;
      min-width: 280px;
      text-align: center;
    }

    #modal h2 { color: var(--gold); margin-bottom: 12px; font-size: 1rem; }
    #modal p  { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 16px; }

    #modal-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    #modal-actions button {
      background: var(--border);
      color: var(--text);
      border: 1px solid var(--accent);
      padding: 6px 16px;
      font-family: inherit;
      font-size: 0.8rem;
      cursor: pointer;
      border-radius: 2px;
    }

    #modal-actions button.primary { background: var(--accent); color: #fff; }

    /* ── Debug panel ──────────────────────────────────────── */
    #debug-panel {
      border-color: #444;
      opacity: 0.85;
    }

    #debug-panel h3 { color: #666; }

    .debug-btn {
      width: 100%;
      background: #1a1a2e;
      color: #aaa;
      border: 1px solid #444;
      padding: 5px 10px;
      font-family: inherit;
      font-size: 0.75rem;
      cursor: pointer;
      border-radius: 2px;
      text-align: left;
      margin-bottom: 6px;
      transition: background 0.1s, color 0.1s;
    }

    .debug-btn:hover { background: #444; color: #fff; }

    /* ── Tools ────────────────────────────────────────────────── */
    .tool-item {
      display: flex;
      align-items: center;
      font-size: 0.8rem;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 2px;
      transition: background 0.1s;
    }

    .tool-item:hover { background: var(--border); }

    .tool-item.selected {
      background: #0e2d45;
      border: 1px solid #5bc4e3;
      color: #a8dff7;
    }

    .pot.watered {
      border-color: #4aaed0;
      box-shadow: 0 3px 10px rgba(0,0,0,0.4), 0 0 8px rgba(40,152,208,0.3),
                  inset 0 1px 0 rgba(255,180,80,0.06);
    }

    .pot.fertilized {
      border-color: #5cd85c;
      box-shadow: 0 3px 10px rgba(0,0,0,0.4), 0 0 10px rgba(92,216,92,0.35),
                  inset 0 1px 0 rgba(255,180,80,0.06);
    }

    .fertilizer-mode .pot:hover {
      border-color: #5cd85c;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5), 0 0 10px rgba(92,216,92,0.3);
    }

    .water-mode .pot:hover {
      border-color: #5bc4e3;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5), 0 0 10px rgba(91,196,227,0.28);
    }
  </style>
</head>
<body>

  <!-- ── Header / HUD ──────────────────────────────────────── -->
  <header>
    <h1>🌱 Zélie's Garden</h1>
    <div id="hud">
      <div><span>Coins </span><strong id="hud-coins">0</strong></div>
      <div><span>Day </span><strong id="hud-day">1</strong></div>
      <div><span>Seeds </span><strong id="hud-seeds">0</strong></div>
    </div>
  </header>

  <!-- ── Main ──────────────────────────────────────────────── -->
  <main>

    <!-- Garden grid -->
    <section id="garden-area">
      <h2>Your Garden</h2>
      <div id="garden-grid">
        <!-- Pot elements injected by JS -->
      </div>
    </section>

    <!-- Sidebar -->
    <aside id="sidebar">

      <div class="panel">
        <h3>Strumenti</h3>
        <div id="tool-list">
          <!-- Tool items injected by JS -->
        </div>
      </div>

      <div class="panel">
        <h3>Seeds</h3>
        <div id="seed-list">
          <!-- Seed items injected by JS -->
        </div>
      </div>

      <div class="panel">
        <h3>Shop</h3>
        <div id="shop-list">
          <!-- Shop items injected by JS -->
        </div>
      </div>

      <div class="panel">
        <h3>Log</h3>
        <div id="log">
          <!-- Log entries injected by JS -->
        </div>
      </div>

      <div class="panel" id="debug-panel">
        <h3>Debug</h3>
        <button class="debug-btn" onclick="dbgGrowAll()">⏭ Avanza 1 giorno</button>
        <button class="debug-btn" onclick="dbgReadyAll()">🌟 Make all plants ready</button>
        <button class="debug-btn" onclick="dbgAddCoins()">💰 Add 50 coins</button>
        <button class="debug-btn" onclick="dbgReset()">🗑 Reset save</button>
      </div>

    </aside>
  </main>

  <!-- ── Modal ─────────────────────────────────────────────── -->
  <div id="modal-overlay">
    <div id="modal">
      <h2 id="modal-title">Title</h2>
      <p  id="modal-body">Body text</p>
      <div id="modal-actions">
        <!-- Buttons injected by JS -->
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
